<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
        content="width=device-width, 
        initial-scale=1.0">
    <title>NexLabel - Add Member</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .form-wrapper {
            max-width: 560px;
            margin: 0 auto;
        }
        .form-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .form-subtitle {
            color: #8892a4;
            font-size: 14px;
            margin-bottom: 32px;
        }
        .role-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 8px;
        }
        .role-card {
            padding: 14px;
            border-radius: 10px;
            border: 2px solid rgba(0,212,255,0.15);
            background: transparent;
            color: white;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
        }
        .role-card:hover {
            border-color: #00d4ff;
            background: rgba(0,212,255,0.05);
        }
        .role-card.selected {
            border-color: #00d4ff;
            background: rgba(0,212,255,0.1);
        }
        .role-card .role-name {
            font-weight: 700;
            font-size: 14px;
            margin-bottom: 4px;
        }
        .role-card .role-desc {
            font-size: 12px;
            color: #8892a4;
        }
        .success-msg {
            background: rgba(0,196,140,0.1);
            border: 1px solid #00c48c;
            color: #00c48c;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg {
            background: rgba(255,77,77,0.1);
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            Nex<span>Label</span>
        </div>
        <ul class="sidebar-menu">
            <li>
                <a href="owner.html">
                    ← Back to Dashboard
                </a>
            </li>
            <li>
                <a href="#" class="active">
                    👤 Add Member
                </a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div class="topbar">
            <div>
                <h1>Add Team Member</h1>
                <p style="color:#8892a4;
                    font-size:13px;">
                    Create a new account for 
                    your team
                </p>
            </div>
            <div style="display:flex;
                align-items:center; gap:12px;">
                <span id="userName"
                    style="color:#8892a4;">
                </span>
                <span class="role-badge"
                    style="background:rgba(255,176,32,0.1);
                    border-color:#ffb020;
                    color:#ffb020;">
                    👑 Owner
                </span>
                <button class="btn btn-outline"
                    onclick="logout()"
                    style="padding:6px 12px;
                    font-size:12px;">
                    Logout
                </button>
            </div>
        </div>

        <div class="form-wrapper">
            <div class="card">
                <div class="success-msg" 
                    id="successMsg">
                </div>
                <div class="error-msg" 
                    id="errorMsg">
                </div>

                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" 
                        id="fullName"
                        placeholder="e.g. Juan dela Cruz">
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" 
                        id="email"
                        placeholder="juan@nexxlabel.com">
                </div>

                <div class="input-group">
                    <label>Password</label>
                    <input type="password" 
                        id="password"
                        placeholder="Minimum 8 characters">
                </div>

                <div class="input-group">
                    <label>Select Role</label>
                    <div class="role-grid">
                        <button class="role-card"
                            onclick="selectRole(
                                'subowner', this
                            )">
                            <div class="role-name">
                                🔑 Sub-Owner
                            </div>
                            <div class="role-desc">
                                Full access except 
                                delete
                            </div>
                        </button>
                        <button class="role-card"
                            onclick="selectRole(
                                'approver', this
                            )">
                            <div class="role-name">
                                ✅ Approver
                            </div>
                            <div class="role-desc">
                                Approve, review 
                                and annotate
                            </div>
                        </button>
                        <button class="role-card"
                            onclick="selectRole(
                                'reviewer', this
                            )">
                            <div class="role-name">
                                🔍 Reviewer
                            </div>
                            <div class="role-desc">
                                Review and 
                                annotate tasks
                            </div>
                        </button>
                        <button class="role-card"
                            onclick="selectRole(
                                'annotator', this
                            )">
                            <div class="role-name">
                                ✏️ Annotator
                            </div>
                            <div class="role-desc">
                                Label and 
                                annotate tasks
                            </div>
                        </button>
                    </div>
                    <input type="hidden" id="role">
                </div>

                <button class="btn btn-primary"
                    onclick="handleAddMember()"
                    style="width:100%; padding:14px;
                    font-size:16px;">
                    Create Account
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        window.onload = async function() {
            const profile = await requireAuth();
            if (!profile) return;

            if (profile.role !== 'owner' &&
                profile.role !== 'subowner') {
                window.location.href = 'owner.html';
                return;
            }
            loadUserInfo(profile);
        }

        function selectRole(role, btn) {
            document.querySelectorAll('.role-card')
                .forEach(c => {
                    c.classList.remove('selected');
                });
            btn.classList.add('selected');
            document.getElementById('role')
                .value = role;
        }

        async function handleAddMember() {
            const fullName = document
                .getElementById('fullName').value;
            const email = document
                .getElementById('email').value;
            const password = document
                .getElementById('password').value;
            const role = document
                .getElementById('role').value;

            const errorMsg = document
                .getElementById('errorMsg');
            const successMsg = document
                .getElementById('successMsg');

            // Validate
            if (!fullName || !email || 
                !password || !role) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 
                    'Please fill in all fields ' +
                    'and select a role!';
                return;
            }

            if (password.length < 8) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 
                    'Password must be at ' +
                    'least 8 characters!';
                return;
            }

            const btn = document
                .querySelector('.btn-primary');
            btn.textContent = 'Creating account...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                await createUser(
                    email, password, 
                    fullName, role, 'NexLabel'
                );

                successMsg.style.display = 'block';
                successMsg.textContent = 
                    '✅ Account created for ' + 
                    fullName + '! They can now login.';

                // Reset form
                document.getElementById('fullName')
                    .value = '';
                document.getElementById('email')
                    .value = '';
                document.getElementById('password')
                    .value = '';
                document.getElementById('role')
                    .value = '';
                document.querySelectorAll('.role-card')
                    .forEach(c => {
                        c.classList.remove('selected');
                    });

                btn.textContent = 'Create Account';
                btn.disabled = false;

            } catch(error) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 
                    'Error: ' + error.message;
                btn.textContent = 'Create Account';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
