<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" 
        content="width=device-width, 
        initial-scale=1.0">
    <title>NexLabel - Create Project</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .form-wrapper {
            max-width: 560px;
            margin: 0 auto;
        }
        .client-select {
            width: 100%;
            padding: 12px 16px;
            background: #111827;
            border: 1px solid rgba(0,212,255,0.15);
            border-radius: 8px;
            color: white;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        .client-select:focus {
            border-color: #00d4ff;
        }
        .client-select option {
            background: #111827;
            color: white;
        }
        .type-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 8px;
        }
        .type-card {
            padding: 12px;
            border-radius: 10px;
            border: 2px solid rgba(0,212,255,0.15);
            background: transparent;
            color: white;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s ease;
            font-size: 13px;
        }
        .type-card:hover {
            border-color: #00d4ff;
            background: rgba(0,212,255,0.05);
        }
        .type-card.selected {
            border-color: #00d4ff;
            background: rgba(0,212,255,0.1);
        }
        .type-icon {
            font-size: 24px;
            margin-bottom: 6px;
        }
        .success-msg {
            background: rgba(0,196,140,0.1);
            border: 1px solid #00c48c;
            color: #00c48c;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
        .error-msg {
            background: rgba(255,77,77,0.1);
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">
            Nex<span>Label</span>
        </div>
        <ul class="sidebar-menu">
            <li>
                <a href="owner.html">
                    ← Back to Dashboard
                </a>
            </li>
            <li>
                <a href="#" class="active">
                    📁 Create Project
                </a>
            </li>
        </ul>
    </div>

    <div class="main-content">
        <div class="topbar">
            <div>
                <h1>Create New Project</h1>
                <p style="color:#8892a4;
                    font-size:13px;">
                    Set up a new annotation project
                </p>
            </div>
            <div style="display:flex;
                align-items:center; gap:12px;">
                <span id="userName"
                    style="color:#8892a4;">
                </span>
                <span class="role-badge"
                    style="background:rgba(255,176,32,0.1);
                    border-color:#ffb020;
                    color:#ffb020;">
                    👑 Owner
                </span>
                <button class="btn btn-outline"
                    onclick="logout()"
                    style="padding:6px 12px;
                    font-size:12px;">
                    Logout
                </button>
            </div>
        </div>

        <div class="form-wrapper">
            <div class="card">
                <div class="success-msg"
                    id="successMsg">
                </div>
                <div class="error-msg"
                    id="errorMsg">
                </div>

                <div class="input-group">
                    <label>Project Name</label>
                    <input type="text"
                        id="projectName"
                        placeholder="e.g. Product Image Classification">
                </div>

                <div class="input-group">
                    <label>Select Client</label>
                    <select class="client-select"
                        id="clientSelect">
                        <option value="">
                            Loading clients...
                        </option>
                    </select>
                </div>

                <div class="input-group">
                    <label>Annotation Type</label>
                    <div class="type-grid">
                        <button class="type-card"
                            onclick="selectType(
                                'image', this
                            )">
                            <div class="type-icon">
                                🖼️
                            </div>
                            Image
                        </button>
                        <button class="type-card"
                            onclick="selectType(
                                'video', this
                            )">
                            <div class="type-icon">
                                🎥
                            </div>
                            Video
                        </button>
                        <button class="type-card"
                            onclick="selectType(
                                'text', this
                            )">
                            <div class="type-icon">
                                📝
                            </div>
                            Text
                        </button>
                        <button class="type-card"
                            onclick="selectType(
                                'audio', this
                            )">
                            <div class="type-icon">
                                🎵
                            </div>
                            Audio
                        </button>
                        <button class="type-card"
                            onclick="selectType(
                                '3d', this
                            )">
                            <div class="type-icon">
                                📦
                            </div>
                            3D Point Cloud
                        </button>
                        <button class="type-card"
                            onclick="selectType(
                                'mixed', this
                            )">
                            <div class="type-icon">
                                🔀
                            </div>
                            Mixed
                        </button>
                    </div>
                    <input type="hidden" id="type">
                </div>

                <div class="input-group">
                    <label>Description (optional)</label>
                    <input type="text"
                        id="description"
                        placeholder="Brief project description">
                </div>

                <div class="input-group">
                    <label>Deadline (optional)</label>
                    <input type="date"
                        id="deadline"
                        style="color-scheme: dark;">
                </div>

                <button class="btn btn-primary"
                    onclick="handleCreateProject()"
                    style="width:100%; padding:14px;
                    font-size:16px;">
                    Create Project
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        window.onload = async function() {
            const profile = await requireAuth();
            if (!profile) return;

            if (profile.role !== 'owner' &&
                profile.role !== 'subowner') {
                window.location.href = 'owner.html';
                return;
            }

            loadUserInfo(profile);
            await loadClients();
        }

        async function loadClients() {
            try {
                const clients = await getClients();
                const select = document
                    .getElementById('clientSelect');

                if (clients.length === 0) {
                    select.innerHTML = `
                        <option value="">
                            No clients yet — 
                            Add a client first
                        </option>`;
                    return;
                }

                select.innerHTML = `
                    <option value="">
                        Select a client...
                    </option>` +
                    clients.map(c => `
                        <option value="${c.id}">
                            ${c.full_name} 
                            ${c.company 
                                ? '(' + c.company + ')' 
                                : ''}
                        </option>
                    `).join('');

            } catch(error) {
                console.error('Clients error:', error);
            }
        }

        function selectType(type, btn) {
            document.querySelectorAll('.type-card')
                .forEach(c => {
                    c.classList.remove('selected');
                });
            btn.classList.add('selected');
            document.getElementById('type')
                .value = type;
        }

        async function handleCreateProject() {
            const name = document
                .getElementById('projectName').value;
            const clientId = document
                .getElementById('clientSelect').value;
            const type = document
                .getElementById('type').value;

            const errorMsg = document
                .getElementById('errorMsg');
            const successMsg = document
                .getElementById('successMsg');

            if (!name || !clientId || !type) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 
                    'Please fill in project name, ' +
                    'select a client and annotation type!';
                return;
            }

            const btn = document
                .querySelector('.btn-primary');
            btn.textContent = 'Creating project...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const profile = 
                    await getCurrentProfile();
                await createProject(
                    name, clientId, profile.id
                );

                successMsg.style.display = 'block';
                successMsg.textContent = 
                    '✅ Project "' + name + 
                    '" created successfully!';

                // Reset form
                document.getElementById('projectName')
                    .value = '';
                document.getElementById('clientSelect')
                    .value = '';
                document.getElementById('type')
                    .value = '';
                document.querySelectorAll('.type-card')
                    .forEach(c => {
                        c.classList.remove('selected');
                    });

                btn.textContent = 'Create Project';
                btn.disabled = false;

            } catch(error) {
                errorMsg.style.display = 'block';
                errorMsg.textContent = 
                    'Error: ' + error.message;
                btn.textContent = 'Create Project';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
