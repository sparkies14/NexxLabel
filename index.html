<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexLabel - Powering AI Through Precision Labeling</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0f1e;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            text-align: center;
        }
        .logo {
            font-size: 48px;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .logo span {
            color: #00d4ff;
        }
        .tagline {
            color: #8892a4;
            font-size: 16px;
            margin-bottom: 40px;
        }
        .status {
            background: rgba(0, 212, 255, 0.1);
            border: 1px solid #00d4ff;
            border-radius: 8px;
            padding: 12px 24px;
            color: #00d4ff;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">Nex<span>Label</span></div>
        <div class="tagline">Powering AI Through Precision Labeling</div>
        <div class="status">🚀 Platform Launching Soon</div>
    </div>
</body>
</html>
