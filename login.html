<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexLabel — Login</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .login-wrapper{
            display:flex;justify-content:center;
            align-items:center;min-height:100vh;
            position:relative;z-index:2;
            padding:40px 20px;
        }
        .login-card{
            width:100%;max-width:420px;
            padding:48px;
            background:rgba(4,6,10,0.92);
            border:1px solid rgba(201,168,76,0.15);
            position:relative;
            backdrop-filter:blur(24px);
        }
        .login-card::before{
            content:'';position:absolute;
            top:0;left:0;right:0;height:1px;
            background:linear-gradient(90deg,transparent,var(--gold),transparent);
        }
        .login-logo{
            text-align:center;margin-bottom:6px;
            font-family:'Syne',sans-serif;
            font-size:32px;font-weight:800;
            letter-spacing:-0.5px;
        }
        .login-logo span{
            background:linear-gradient(135deg,var(--gold),var(--gold3));
            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;
            background-clip:text;
        }
        .login-tagline{
            text-align:center;color:var(--muted);
            font-size:11px;margin-bottom:40px;
            letter-spacing:2px;text-transform:uppercase;
            font-weight:500;
        }
        .login-title{
            font-family:'Cormorant Garamond',serif;
            font-size:26px;font-weight:700;
            margin-bottom:28px;letter-spacing:-0.3px;
        }
        .login-btn{
            width:100%;padding:14px;
            background:linear-gradient(135deg,var(--gold),#a07830);
            color:var(--black);border:none;
            font-family:'Syne',sans-serif;
            font-size:13px;font-weight:700;
            cursor:pointer;transition:all 0.3s ease;
            letter-spacing:2px;text-transform:uppercase;
        }
        .login-btn:hover{
            transform:translateY(-2px);
            box-shadow:0 8px 30px rgba(201,168,76,0.35);
        }
        .login-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}
        .forgot-link{
            display:block;text-align:center;
            margin-top:18px;color:var(--muted);
            text-decoration:none;font-size:12px;
            letter-spacing:0.5px;transition:color 0.3s;
        }
        .forgot-link:hover{color:var(--gold2);}
        .contact-admin{
            text-align:center;margin-top:32px;
            color:var(--muted);font-size:12px;
            padding-top:20px;
            border-top:1px solid var(--gold-border2);
            letter-spacing:0.3px;
        }
        .contact-admin strong{color:var(--gold2);}
        .input-icon{position:relative;}
        .input-icon input{padding-left:40px;}
        .input-icon .icon{
            position:absolute;left:14px;
            top:50%;transform:translateY(-50%);
            color:var(--muted);font-size:14px;
        }
        .error-msg{
            background:rgba(201,76,76,0.08);
            border:1px solid rgba(201,76,76,0.25);
            border-left:2px solid var(--danger);
            color:#e87070;padding:10px 14px;
            font-size:12px;margin-bottom:16px;
            display:none;letter-spacing:0.3px;
        }
        .gold-corner{
            position:absolute;width:12px;height:12px;
        }
        .gold-corner.tl{top:-1px;left:-1px;
            border-top:1px solid var(--gold);
            border-left:1px solid var(--gold);}
        .gold-corner.tr{top:-1px;right:-1px;
            border-top:1px solid var(--gold);
            border-right:1px solid var(--gold);}
        .gold-corner.bl{bottom:-1px;left:-1px;
            border-bottom:1px solid var(--gold);
            border-left:1px solid var(--gold);}
        .gold-corner.br{bottom:-1px;right:-1px;
            border-bottom:1px solid var(--gold);
            border-right:1px solid var(--gold);}
    </style>
</head>
<body>
    <canvas id="geo-canvas"></canvas>
    <div class="geo-overlay"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <!-- Corner accents -->
            <div class="gold-corner tl"></div>
            <div class="gold-corner tr"></div>
            <div class="gold-corner bl"></div>
            <div class="gold-corner br"></div>

            <div class="login-logo">Nex<span>Label</span></div>
            <div class="login-tagline">
                Powering AI Through Precision Labeling
            </div>

            <div class="login-title">Welcome Back</div>

            <div class="error-msg" id="errorMsg">
                Invalid email or password. Please try again.
            </div>

            <div class="input-group">
                <label>Email Address</label>
                <div class="input-icon">
                    <span class="icon">✉</span>
                    <input type="email" id="email"
                        placeholder="you@nexxlabel.com">
                </div>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="input-icon">
                    <span class="icon">🔒</span>
                    <input type="password" id="password"
                        placeholder="••••••••">
                </div>
            </div>

            <button class="login-btn" onclick="handleLogin()">
                Sign In
            </button>

            <a href="#" class="forgot-link">Forgot password?</a>

            <div class="contact-admin">
                Don't have an account?
                <strong>Contact your administrator</strong>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/geometry.js"></script>
    <script>
        window.onload = async function() {
            try {
                const { data } = await supabaseClient
                    .auth.getSession();
                if (data.session) {
                    const profile =
                        await getCurrentProfile();
                    if (profile) {
                        redirectByRole(profile.role);
                        return;
                    }
                }
            } catch(e) {
                console.error('Session check:', e);
            }
        }

        async function handleLogin() {
            const email = document
                .getElementById('email').value;
            const password = document
                .getElementById('password').value;
            const errorMsg = document
                .getElementById('errorMsg');
            const btn = document
                .querySelector('.login-btn');

            if (!email || !password) {
                errorMsg.style.display = 'block';
                errorMsg.textContent =
                    'Please enter your email and password.';
                return;
            }

            btn.textContent = 'Signing in...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                await signIn(email, password);
                const profile = await getCurrentProfile();
                redirectByRole(profile.role);
            } catch(error) {
                errorMsg.style.display = 'block';
                errorMsg.textContent =
                    'Invalid email or password.';
                btn.textContent = 'Sign In';
                btn.disabled = false;
            }
        }

        document.addEventListener('keypress', e => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
